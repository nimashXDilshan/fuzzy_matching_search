<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrant Search Demo</title>
    <link rel="stylesheet" href="../mysite/css/registrant-search.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .demo-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
        }

        .mock-notice {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #92400e;
            font-size: 14px;
        }

        /* Basic form styling */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #374151;
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-block {
            width: 100%;
        }

        .hidden {
            display: none !important;
        }

        .input-group-set {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .search-actions {
            margin-top: 16px;
        }

        .registrant-type-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 16px;
            background: #f3f4f6;
            border-radius: 12px;
        }

        .type-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .type-option input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #6366f1;
        }

        .results-list {
            margin-top: 20px;
        }

        .result-item {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-item:hover {
            background: #eef2ff;
        }

        .result-item.selected {
            background: #c7d2fe;
            border: 2px solid #6366f1;
        }

        .result-content {
            flex: 1;
        }

        .result-name {
            font-weight: 600;
            color: #1f2937;
        }

        .result-details {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }

        .detail-separator {
            margin: 0 8px;
            color: #d1d5db;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .loading-spinner {
            text-align: center;
            padding: 20px;
            color: #6b7280;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #e5e7eb;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="demo-container">
        <h1>🔍 Registrant Search Demo</h1>
        <p class="subtitle">Fuzzy Search for Individuals and Organizations</p>

        <div class="mock-notice">
            ⚠️ <strong>Demo Mode:</strong> This demo uses mock data. The backend API is not connected.
        </div>

        <div id="registrant-search-container"></div>
    </div>

    <script src="mock-data.js"></script>
    <script src="../mysite/javascript/registrant-search.js"></script>
    <script>
        // Override the fetch function for demo purposes
        const originalFetch = window.fetch;
        window.fetch = async function (url, options) {
            console.log('Mock fetch:', url, options);

            // Simulate network delay
            await new Promise(resolve => setTimeout(resolve, 300));

            // Mock domain reasons
            if (url.includes('/domain-reasons')) {
                return new Response(JSON.stringify({
                    success: true,
                    reasons: [
                        { id: 1, name: 'Personal/Individual', allowedTypes: ['individual'] },
                        { id: 2, name: 'Business/Commercial', allowedTypes: ['organization'] },
                        { id: 3, name: 'General Purpose', allowedTypes: ['individual', 'organization'] }
                    ]
                }));
            }

            // Mock countries
            if (url.includes('/countries')) {
                return new Response(JSON.stringify({
                    success: true,
                    countries: [
                        { id: 1, name: 'Sri Lanka' },
                        { id: 2, name: 'India' },
                        { id: 3, name: 'United Kingdom' }
                    ]
                }));
            }

            // Mock registrant types
            if (url.includes('/registrant-types/')) {
                const reasonId = parseInt(url.split('/').pop());
                let config = { allowedTypes: ['individual', 'organization'], defaultType: 'individual', isLocked: false };
                if (reasonId === 1) config = { allowedTypes: ['individual'], defaultType: 'individual', isLocked: true };
                if (reasonId === 2) config = { allowedTypes: ['organization'], defaultType: 'organization', isLocked: true };
                return new Response(JSON.stringify({ success: true, config }));
            }

            // Mock customer search - FIELD-SPECIFIC ALGORITHM MATCHING
            if (url.includes('/search-customers') && options?.method === 'POST') {
                const body = JSON.parse(options.body);
                const searchFields = body.searchFields || ['name'];
                const searchTerms = body.searchTerms || {};

                console.log('Field-specific algorithm matching:', searchFields, searchTerms);

                // Start with all customers
                let candidates = [...window.MockAPI.mockCustomers];

                // If we have multiple search terms, filter by EACH (AND logic)
                if (Object.keys(searchTerms).length > 1) {
                    // AND logic: must match ALL provided fields
                    for (const [field, term] of Object.entries(searchTerms)) {
                        if (!term || term.length < 2) continue;

                        let matchingIds;

                        // Use SPECIALIZED matcher for each field type
                        if (field === 'name') {
                            // JARO-WINKLER + DOUBLE METAPHONE for names
                            matchingIds = new Set(
                                window.MockAPI.FuzzyMatcher.matchName(candidates, term)
                                    .map(r => r.id)
                            );
                            console.log(`Name match [Jaro-Winkler] "${term}": found ${matchingIds.size} records`);
                        } else if (field === 'nic') {
                            // LEVENSHTEIN with k=2 for NIC/Passport
                            matchingIds = new Set(
                                window.MockAPI.FuzzyMatcher.matchNIC(candidates, term)
                                    .map(r => r.id)
                            );
                            console.log(`NIC match [Levenshtein k=2] "${term}": found ${matchingIds.size} records`);
                        } else if (field === 'email') {
                            // N-GRAM TRIGRAM for emails
                            matchingIds = new Set(
                                window.MockAPI.FuzzyMatcher.matchEmail(candidates, term)
                                    .map(r => r.id)
                            );
                            console.log(`Email match [N-Gram] "${term}": found ${matchingIds.size} records`);
                        } else if (field === 'phone') {
                            // HAMMING/SUFFIX match for Phone
                            matchingIds = new Set(
                                window.MockAPI.FuzzyMatcher.matchPhone(candidates, term)
                                    .map(r => r.id)
                            );
                            console.log(`Phone match [Hamming] "${term}": found ${matchingIds.size} records`);
                        } else {
                            // Fallback to generic search
                            matchingIds = new Set(
                                window.MockAPI.FuzzyMatcher.search(candidates, term, [field])
                                    .map(r => r.id)
                            );
                        }

                        // Filter to only those that matched
                        candidates = candidates.filter(c => matchingIds.has(c.id));
                    }

                    // Add match scores
                    candidates = candidates.map(c => ({ ...c, _matchScore: 80 }));
                } else {
                    // Single field search - use appropriate specialized matcher
                    const field = searchFields[0];
                    const term = body.searchTerm || Object.values(searchTerms)[0];

                    if (field === 'name') {
                        candidates = window.MockAPI.FuzzyMatcher.matchName(candidates, term);
                        console.log(`Single Name search [Jaro-Winkler] "${term}": found ${candidates.length} records`);
                    } else if (field === 'nic') {
                        candidates = window.MockAPI.FuzzyMatcher.matchNIC(candidates, term);
                        console.log(`Single NIC search [Levenshtein] "${term}": found ${candidates.length} records`);
                    } else if (field === 'email') {
                        candidates = window.MockAPI.FuzzyMatcher.matchEmail(candidates, term);
                        console.log(`Single Email search [N-Gram] "${term}": found ${candidates.length} records`);
                    } else if (field === 'phone') {
                        candidates = window.MockAPI.FuzzyMatcher.matchPhone(candidates, term);
                        console.log(`Single Phone search [Hamming] "${term}": found ${candidates.length} records`);
                    } else {
                        candidates = window.MockAPI.FuzzyMatcher.search(candidates, term, [field]);
                    }
                }

                // Map to result format with masked phone
                const results = candidates.slice(0, body.limit || 30).map(c => ({
                    id: c.id,
                    displayName: `${c.firstName} ${c.lastName}`,
                    maskedEmail: maskEmail(c.email),
                    partialNIC: null, // REMOVED for privacy
                    maskedPhone: maskPhone(c.phone),
                    matchScore: c._matchScore
                }));

                console.log('Found', results.length, 'matches with specialized algorithms');
                return new Response(JSON.stringify({ success: true, results }));
            }

            // Mock organization search - FIELD-SPECIFIC ALGORITHM MATCHING with AND logic
            if (url.includes('/search-organizations') && options?.method === 'POST') {
                const body = JSON.parse(options.body);
                const searchTerms = body.searchTerms || {};
                const searchFields = body.searchFields || ['name'];

                console.log('Organization search with field-specific algorithms:', searchTerms, 'fields:', searchFields);

                // Start with all organizations
                let candidates = [...window.MockAPI.mockOrganizations];

                // If we have multiple search terms, filter by EACH (AND logic)
                if (Object.keys(searchTerms).length > 1) {
                    // AND logic: must match ALL provided fields
                    for (const [field, term] of Object.entries(searchTerms)) {
                        if (!term || term.length < 2) continue;

                        let matchingIds;

                        // Use SPECIALIZED matcher for each field type
                        if (field === 'brNumber') {
                            // LEVENSHTEIN for BR Numbers (threshold 0.85)
                            matchingIds = new Set(
                                window.MockAPI.FuzzyMatcher.matchBRNumber(candidates, term)
                                    .map(r => r.id)
                            );
                            console.log(`BR Number match [Levenshtein 0.85] "${term}": found ${matchingIds.size} records`);
                        } else if (field === 'name') {
                            // TRIGRAM for Organization Names (word order independent)
                            matchingIds = new Set(
                                window.MockAPI.FuzzyMatcher.matchOrgName(candidates, term)
                                    .map(r => r.id)
                            );
                            console.log(`Org Name match [Trigram] "${term}": found ${matchingIds.size} records`);
                        } else {
                            // Fallback to generic search
                            matchingIds = new Set(
                                window.MockAPI.FuzzyMatcher.search(candidates, term, [field])
                                    .map(r => r.id)
                            );
                        }

                        // Filter to only those that matched (AND logic - narrows results)
                        candidates = candidates.filter(c => matchingIds.has(c.id));
                    }

                    // Add match scores
                    candidates = candidates.map(c => ({ ...c, _matchScore: 80 }));
                } else {
                    // Single field search - use appropriate specialized matcher
                    const field = searchFields[0];
                    const term = body.searchTerm || Object.values(searchTerms)[0];

                    if (field === 'brNumber') {
                        candidates = window.MockAPI.FuzzyMatcher.matchBRNumber(candidates, term);
                        console.log(`Single BR Number search [Levenshtein 0.85] "${term}": found ${candidates.length} records`);
                    } else if (field === 'name') {
                        candidates = window.MockAPI.FuzzyMatcher.matchOrgName(candidates, term);
                        console.log(`Single Org Name search [Trigram] "${term}": found ${candidates.length} records`);
                    } else {
                        candidates = window.MockAPI.FuzzyMatcher.search(candidates, term, [field]);
                    }
                }

                const results = candidates.slice(0, body.limit || 30).map(o => ({
                    id: o.id,
                    name: o.name,
                    partialBRNumber: maskBR(o.brNumber),
                    country: o.location || 'Sri Lanka',
                    countryId: 1,
                    matchScore: o._matchScore,
                    algorithm: o._algorithm || 'trigram'
                }));

                console.log('Found', results.length, 'matches with specialized algorithms');
                return new Response(JSON.stringify({ success: true, results }));
            }

            // Mock validation
            if (url.includes('/validate-selection')) {
                return new Response(JSON.stringify({ success: true, valid: true }));
            }

            // Fallback to original fetch
            return originalFetch(url, options);
        };

        // Helper masking functions
        function maskEmail(email) {
            const [local, domain] = email.split('@');
            return local.substring(0, 2) + '***@' + domain;
        }

        function maskNIC(nic) {
            return '***' + nic.slice(-5);
        }

        function maskBR(br) {
            if (!br) return '';
            br = br.toUpperCase().replace(/\s/g, '');
            if (/^([A-Z]{2})(\d+)$/.test(br)) {
                const m = br.match(/^([A-Z]{2})(\d+)$/);
                // Prefix + Masked Middle + Last 3 Digits
                // The number of stars should match the number of hidden digits
                const numLen = m[2].length;
                const visibleCount = 3;

                if (numLen <= visibleCount) {
                    return m[1] + '*'.repeat(numLen);
                }

                return m[1] + '*'.repeat(numLen - visibleCount) + m[2].slice(-visibleCount);
            }
            // Fallback for non-standard format: **** + last 4
            return '****' + br.slice(-4);
        }

        function maskPhone(phone) {
            if (!phone) return 'N/A';
            // Show only last 4 digits: ******1234
            return '******' + phone.slice(-4);
        }

        // Listen for events
        document.addEventListener('registrantSearch:selectionConfirmed', (e) => {
            alert('Selection Confirmed!\n\n' + JSON.stringify(e.detail, null, 2));
        });

        document.addEventListener('registrantSearch:createNew', (e) => {
            alert('Create New Registrant!\n\n' + JSON.stringify(e.detail, null, 2));
        });

        document.addEventListener('registrantSearch:cancelled', () => {
            alert('Search Cancelled');
        });
    </script>
</body>

</html>
