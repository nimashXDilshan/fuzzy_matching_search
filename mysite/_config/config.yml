---
Name: lkdomains
After: 'framework/*'
---

# Enable default record requirement
SilverStripe\ORM\DatabaseAdmin:
  require_default_records: true

# Fix for SQLite3 queryCache on null in tests
SilverStripe\Core\Injector\Injector:
  SilverStripe\ORM\Connect\Database:
    class: SilverStripe\SQLite\SQLite3Database
    properties:
      queryCache: '%$QueryCache'
  SilverStripe\ORM\Connect\QueryCache:
    class: SilverStripe\ORM\Connect\BasicQueryCache
